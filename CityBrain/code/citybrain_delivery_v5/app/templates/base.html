<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>{{ title or "CityBrain" }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{--blue:#114ea3;--green:#2d8a57;--dark:#1b2b44;--muted:#607089;--line:#dbe5f2;--bg:#f4f7fb;--card:#fff;}
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:var(--dark)}
    header{background:var(--blue);color:#fff;padding:18px 24px;font-weight:700}
    main{max-width:1280px;margin:24px auto;padding:0 16px}
    .card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:0 4px 18px rgba(0,0,0,.06)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .metric{padding:18px;border:1px solid var(--line);border-radius:14px;background:#fafcff}
    .metric .label{color:var(--muted);font-size:14px}
    .metric .value{font-size:28px;font-weight:700;margin-top:8px}
    .btn{display:inline-block;padding:10px 14px;border-radius:10px;text-decoration:none;border:none;cursor:pointer;background:var(--blue);color:#fff;font-weight:600}
    .btn.secondary{background:var(--green)}
    .btn.warn{background:#8a3b2d}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #e5ebf4;text-align:left;font-size:14px;vertical-align:top}
    input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #ccd7e8}
    textarea{min-height:88px}
    .topbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:18px}
    .small{color:var(--muted);font-size:13px}
    .section-title{margin:0 0 12px 0}
    .notice{padding:12px 14px;border-left:4px solid var(--green);background:#f3fbf6;border-radius:10px}
    .cols-2{display:grid;grid-template-columns:1.1fr 1fr;gap:18px}
    @media (max-width: 900px){ .cols-2{grid-template-columns:1fr} }
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef4ff;color:#114ea3;font-size:12px;font-weight:700}
    form.inline {display:inline}
  </style>
</head>
<body>
  <header>CityBrain · 학생식당 운영 개선 납품 검토용 베타 V5</header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
